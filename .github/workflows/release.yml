name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: PythonChess-linux
          - os: macos-latest
            artifact_name: PythonChess-macos
          - os: windows-latest
            artifact_name: PythonChess-windows
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SDL deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsdl2-2.0-0 libsdl2-image-2.0-0 libsdl2-mixer-2.0-0 \
            libsdl2-ttf-2.0-0 xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy chess_game

      - name: Pytest (Linux, headless via Xvfb)
        if: runner.os == 'Linux'
        run: |
          export SDL_AUDIODRIVER=dummy
          xvfb-run -a pytest

      - name: Pytest (macOS/Windows, headless via dummy SDL drivers)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          export SDL_VIDEODRIVER=dummy
          export SDL_AUDIODRIVER=dummy
          pytest

      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m venv build-venv
          source build-venv/bin/activate
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller
          pyinstaller --onefile --add-data "data:data" --name "PythonChess" main.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m venv build-venv
          source build-venv/bin/activate
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller pillow
          pyinstaller --onedir --windowed --strip --icon=icon.ico --add-data "data:data" --name "PythonChess" main.py

      - name: Thin universal2 binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          ARCH="$(uname -m)"
          echo "Thinning fat binaries down to ${ARCH}"
          find dist/PythonChess.app -type f \( -name "*.dylib" -o -name "*.so" -o -perm -u+x \) -print0 | \
            while IFS= read -r -d '' f; do
              if file "$f" | grep -q "Mach-O universal binary"; then
                MODE="$(stat -f '%Lp' "$f")"
                lipo -thin "$ARCH" "$f" -output "$f.thin" && mv "$f.thin" "$f"
                chmod "$MODE" "$f"
              fi
            done

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m venv build-venv
          source build-venv/Scripts/activate
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller
          pyinstaller --onefile --windowed --icon=icon.ico --add-data "data;data" --name "PythonChess" main.py

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p package
          VERSION="${{ steps.version.outputs.version }}"
          if [ "${{ runner.os }}" = "Linux" ]; then
            NAME="PythonChess-${VERSION}-Linux"
            mkdir -p "package/${NAME}"
            cp dist/PythonChess "package/${NAME}/"
            (cd package && XZ_OPT=-9e tar -cJf "${NAME}.tar.xz" "${NAME}")
          elif [ "${{ runner.os }}" = "macOS" ]; then
            NAME="PythonChess-${VERSION}-macOS"
            mkdir -p "package/${NAME}"
            cp -r dist/PythonChess.app "package/${NAME}/"
            (cd package && zip -r -9 "${NAME}.zip" "${NAME}")
          else
            NAME="PythonChess-${VERSION}-Windows"
            mkdir -p "package/${NAME}"
            cp dist/PythonChess.exe "package/${NAME}/"
            powershell -Command "Compress-Archive -Path 'package/${NAME}' -DestinationPath 'package/${NAME}.zip' -CompressionLevel Optimal"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            package/*.tar.xz
            package/*.zip

  release:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.xz
            artifacts/*.zip
          generate_release_notes: true
